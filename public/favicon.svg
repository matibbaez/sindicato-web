<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- El mismo degradado de Tailwind (from-indigo-500 to-blue-600) -->
    <linearGradient id="sm-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  
  <!-- Cuadrado con bordes redondeados estilo app -->
  <rect width="512" height="512" rx="120" fill="url(#sm-gradient)" />
  
  <!-- Letras SM centradas y gruesas -->
  <text 
    x="50%" 
    y="54%" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-weight="800" 
    font-size="280" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="middle">
    SM
  </text>
</svg>

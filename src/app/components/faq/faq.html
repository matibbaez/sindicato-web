<section class="py-24 relative overflow-hidden bg-[#030712]">
  
  <div class="absolute left-1/2 bottom-0 -translate-x-1/2 translate-y-1/2 w-[600px] h-[400px] bg-indigo-600/10 blur-[100px] rounded-full pointer-events-none"></div>

  <div class="container mx-auto px-6 max-w-3xl relative z-10">
    
    <div class="text-center mb-16">
      <span class="inline-block px-4 py-1.5 rounded-full border border-indigo-500/30 bg-indigo-500/10 text-indigo-400 text-sm font-semibold tracking-wider uppercase mb-4">
        Dudas Comunes
      </span>
      <h2 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-6">Preguntas Frecuentes</h2>
      <p class="text-lg text-slate-400">Resolvemos tus inquietudes para que inicies tu expediente con total confianza.</p>
    </div>

    <div class="flex flex-col gap-4">
      
      <div *ngFor="let item of faqs; let i = index" 
           class="group rounded-2xl border transition-all duration-300 overflow-hidden backdrop-blur-md"
           [ngClass]="faqOpen === i ? 'border-indigo-500/50 bg-indigo-500/[0.03]' : 'border-white/10 bg-white/[0.02] hover:bg-white/[0.04]'">
        
        <button class="w-full px-6 py-5 flex items-center justify-between text-left focus:outline-none active:bg-white/5 transition-colors" 
                (click)="toggleFaq(i)">
          
          <span class="font-semibold text-[15px] sm:text-base pr-4 transition-colors"
                [ngClass]="faqOpen === i ? 'text-white' : 'text-slate-200 group-hover:text-white'">
            {{ item.pregunta }}
          </span>
          
          <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-transform duration-300"
               [ngClass]="faqOpen === i ? 'bg-indigo-500 text-white rotate-180' : 'bg-white/5 text-slate-400 border border-white/10'">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
          </div>
        </button>
        
        <div class="overflow-hidden transition-all duration-300 ease-in-out"
             [ngClass]="faqOpen === i ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'">
          <div class="px-6 pb-6 pt-2 text-slate-400 text-[15px] leading-relaxed">
            <p>{{ item.respuesta }}</p>
          </div>
        </div>

      </div>

    </div>

  </div>
</section>

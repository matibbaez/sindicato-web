<nav class="fixed top-0 inset-x-0 z-50 transition-all duration-300 border-b"
     [ngClass]="{
       'bg-[#030712]/80 backdrop-blur-xl border-white/10 shadow-lg shadow-black/50': isScrolled || !isHome || menuAbierto,
       'bg-transparent border-transparent py-2': !isScrolled && isHome && !menuAbierto
     }">
  
  <div class="container mx-auto px-6 h-20 flex items-center justify-between">
    
    <a routerLink="/" (click)="cerrarMenu()" class="flex items-center gap-3 group outline-none">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/20 group-hover:shadow-indigo-500/40 transition-all group-active:scale-95">
        SM
      </div>
      <span class="font-bold text-xl tracking-tight text-white hidden sm:block">
        Sindicato<span class="text-indigo-400">Motos</span>
      </span>
    </a>
    
    <div class="hidden lg:flex items-center gap-8">
      
      <a routerLink="/" routerLinkActive="!text-white" [routerLinkActiveOptions]="{exact: true}" class="text-[15px] font-medium text-slate-400 hover:text-white transition-colors">Inicio</a>
      <a routerLink="/iniciar-reclamo" routerLinkActive="!text-white" class="text-[15px] font-medium text-slate-400 hover:text-white transition-colors">Iniciar Expediente</a>
      <a routerLink="/consultar-tramite" routerLinkActive="!text-white" class="text-[15px] font-medium text-slate-400 hover:text-white transition-colors">Seguimiento</a>
      
      <div class="h-5 w-px bg-slate-800" *ngIf="authService.isAuthenticated()"></div>

      <ng-container *ngIf="authService.isAuthenticated()">
        
        <ng-container *ngIf="authService.esAdmin">
          <a routerLink="/admin-dashboard" class="flex items-center gap-1.5 text-[15px] font-semibold text-indigo-400 hover:text-indigo-300 transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Panel Admin
          </a>
        </ng-container>

        <ng-container *ngIf="authService.esTramitador || authService.esSindicato">
          <a [routerLink]="authService.esTramitador ? '/mis-casos' : '/dashboard'" class="flex items-center gap-1.5 text-[15px] font-semibold text-indigo-400 hover:text-indigo-300 transition-colors bg-indigo-500/10 px-3 py-1.5 rounded-lg border border-indigo-500/20">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Mi Panel
            <span class="ml-1 text-[11px] uppercase tracking-wider text-indigo-300/70">{{ authService.esSindicato ? 'Sindicato' : 'Tramitador' }}</span>
          </a>
        </ng-container>

      </ng-container>

      <div class="flex items-center gap-2 pl-2">
        <a *ngIf="!authService.isAuthenticated()" routerLink="/login" class="btn-outline !min-h-[40px] !py-2 !px-5 !text-[14px]">
          Ingresar
        </a>

        <ng-container *ngIf="authService.isAuthenticated()">
          <a routerLink="/mi-perfil" class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-colors active:scale-95" title="Mi Perfil">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </a>
          <button (click)="cerrarSesion()" class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-colors active:scale-95" title="Cerrar Sesión">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </ng-container>
      </div>

    </div>

    <button class="lg:hidden w-12 h-12 flex items-center justify-center text-slate-300 hover:text-white focus:outline-none active:scale-95 transition-transform" (click)="toggleMenu()">
      <svg *ngIf="!menuAbierto" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      <svg *ngIf="menuAbierto" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>

  </div>

  <div class="lg:hidden absolute top-[100%] left-0 w-full bg-[#030712]/95 backdrop-blur-2xl border-b border-white/10 overflow-hidden transition-all duration-300 ease-in-out shadow-2xl"
       [ngClass]="{'max-h-[500px] opacity-100': menuAbierto, 'max-h-0 opacity-0': !menuAbierto}">
    
    <div class="flex flex-col p-4 gap-2">
      <a routerLink="/" (click)="cerrarMenu()" class="flex items-center min-h-[48px] px-4 text-[16px] font-medium text-slate-300 hover:bg-white/5 rounded-xl transition-colors">Inicio</a>
      <a routerLink="/iniciar-reclamo" (click)="cerrarMenu()" class="flex items-center min-h-[48px] px-4 text-[16px] font-medium text-slate-300 hover:bg-white/5 rounded-xl transition-colors">Iniciar Expediente</a>
      <a routerLink="/consultar-tramite" (click)="cerrarMenu()" class="flex items-center min-h-[48px] px-4 text-[16px] font-medium text-slate-300 hover:bg-white/5 rounded-xl transition-colors">Seguimiento</a>
      
      <div class="h-px w-full bg-slate-800/50 my-2" *ngIf="authService.isAuthenticated()"></div>

      <ng-container *ngIf="authService.isAuthenticated()">
        <a *ngIf="authService.esAdmin" routerLink="/admin-dashboard" (click)="cerrarMenu()" class="flex items-center min-h-[48px] px-4 text-[16px] font-semibold text-indigo-400 bg-indigo-500/10 rounded-xl">
          Panel Administrador
        </a>
        
        <a *ngIf="authService.esTramitador || authService.esSindicato" [routerLink]="authService.esTramitador ? '/mis-casos' : '/dashboard'" (click)="cerrarMenu()" class="flex items-center min-h-[48px] px-4 text-[16px] font-semibold text-indigo-400 bg-indigo-500/10 rounded-xl">
          Mi Panel ({{ authService.esSindicato ? 'Sindicato' : 'Tramitador' }})
        </a>
        
        <div class="grid grid-cols-2 gap-2 mt-2">
          <a routerLink="/mi-perfil" (click)="cerrarMenu()" class="flex items-center justify-center gap-2 min-h-[48px] bg-slate-800/50 text-slate-300 rounded-xl font-medium active:scale-95 transition-transform">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Perfil
          </a>
          <button (click)="cerrarSesion(); cerrarMenu()" class="flex items-center justify-center gap-2 min-h-[48px] bg-red-500/10 text-red-400 rounded-xl font-medium active:scale-95 transition-transform">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Salir
          </button>
        </div>
      </ng-container>

      <a *ngIf="!authService.isAuthenticated()" routerLink="/login" (click)="cerrarMenu()" class="flex items-center justify-center min-h-[48px] mt-2 bg-blue-600 text-white rounded-xl font-semibold active:scale-95 transition-transform shadow-lg shadow-blue-900/20">
        Ingresar al Sistema
      </a>
    </div>
  </div>
</nav>

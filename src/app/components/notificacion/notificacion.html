<div class="pointer-events-auto w-full max-w-sm overflow-hidden rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] backdrop-blur-xl border transition-all duration-300 ease-in-out transform mb-4"
     [ngClass]="{
       'bg-[#0f172a]/95': true,
       'border-emerald-500/30': notificacion.tipo === 'success',
       'border-red-500/30': notificacion.tipo === 'error',
       'opacity-0 translate-x-8 scale-95': notificacion.isFadingOut,
       'opacity-100 translate-x-0 scale-100 animate-pop-in': !notificacion.isFadingOut
     }">
     
  <div class="p-4 flex items-start gap-3">
    
    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 border"
         [ngClass]="{
           'bg-emerald-500/10 text-emerald-400 border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.15)]': notificacion.tipo === 'success',
           'bg-red-500/10 text-red-400 border-red-500/20 shadow-[0_0_15px_rgba(239,68,68,0.15)]': notificacion.tipo === 'error'
         }">
      
      <svg *ngIf="notificacion.tipo === 'success'" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      
      <svg *ngIf="notificacion.tipo === 'error'" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>

    <div class="flex-1 min-w-0 pt-0.5">
      <h3 class="text-[15px] font-bold tracking-tight mb-0.5"
          [ngClass]="notificacion.tipo === 'success' ? 'text-emerald-400' : 'text-red-400'">
        {{ notificacion.tipo === 'success' ? '¡Operación Exitosa!' : 'Atención' }}
      </h3>
      <p class="text-sm text-slate-300 leading-relaxed">
        {{ notificacion.mensaje }}
      </p>
    </div>

    <button class="shrink-0 p-1.5 rounded-lg text-slate-500 hover:text-white hover:bg-white/10 transition-colors focus:outline-none active:scale-95" 
            (click)="onClose()" title="Cerrar notificación">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    
  </div>
  
  <div class="w-full h-1 bg-white/5 relative">
    <div class="absolute top-0 left-0 h-full w-full rounded-r-full animate-shrink-width"
         [ngClass]="notificacion.tipo === 'success' ? 'bg-emerald-500/50' : 'bg-red-500/50'"
         [style.animation-duration.ms]="3000">
    </div>
  </div>
  
</div>

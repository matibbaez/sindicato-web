<div class="flex flex-col min-h-screen bg-[#030712]">
  
  <app-navbar></app-navbar>

  <div class="main-content flex-grow flex-1 flex flex-col relative" [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </div>

  <div class="toast-container">
    <app-notificacion 
      *ngFor="let noti of notificacionService.notificaciones$ | async"
      [notificacion]="noti"
      (close)="notificacionService.removerNotificacion(noti.id)">
    </app-notificacion>
  </div>

  <app-footer></app-footer>

</div>
